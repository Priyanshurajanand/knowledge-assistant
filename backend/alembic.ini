# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# prepend the current path to the sys.path so that we can find the app module
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# limit the conversion of the sql attribute value to a certain length
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded that register
# custom types/commands inside the migration environment
# custom_commands =

sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/knowledge_assistant

[post_write_hooks]
# post_write_hooks defines scripts or behavior that is run after a new migration script is generated

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)-5s: %(message)s
datefmt = %H:%M:%S
